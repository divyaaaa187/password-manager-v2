<!DOCTYPE html>
<html>

<head>

    <title>Saved Passwords</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🐚 Ocean Vault</h1>

    <p class="subtitle">
        Search and manage your treasures
    </p>

    <div class="sea-icons">
        🌊 🐠 ⭐ 🪸 🧜‍♀️
    </div>

    <!-- SEARCH BAR -->

    <form method="GET" action="/view_passwords">

        <input type="text"
               name="search"
               placeholder="🔍 Search website...">

        <button type="submit">
            Search
        </button>

    </form>

    <table>

        <tr>

            <th>Website</th>
            <th>Password</th>
            <th>Show</th>
            <th>Delete</th>

        </tr>

        {% for id, website, password in passwords %}

        <tr>

            <td>{{ website }}</td>

            <td>

                <input type="password"
                       value="{{ password }}"
                       id="pwd{{ loop.index }}"
                       readonly>

            </td>

            <td>

                <button onclick="togglePassword('pwd{{ loop.index }}')">

                    👁

                </button>

            </td>

            <td>

                <a href="/delete_password/{{ id }}">

                    <button>
                        🗑
                    </button>

                </a>

            </td>

        </tr>

        {% endfor %}

    </table>

    <div class="links">

        <a href="/dashboard">
            ⬅ Back to Dashboard
        </a>

    </div>

</div>

<script>

function togglePassword(id){

    let field = document.getElementById(id);

    if(field.type === "password"){
        field.type = "text";
    }
    else{
        field.type = "password";
    }
}

</script>

</body>
</html>
