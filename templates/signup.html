<!DOCTYPE html>
<html>

<head>

    <title>Create Account</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1>🐚 Create Account</h1>

    <p class="subtitle">
        Begin your magical ocean journey
    </p>

    <div class="sea-icons">
        🌊 🪸 🐬 ⭐ 🧜‍♀️
    </div>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Create Username"
               required>

        <input type="password"
               name="password"
               placeholder="Create Password"
               required>

        <button type="submit">
            🫧 Signup
        </button>

    </form>

    <div class="links">

        Already have an account?

        <a href="/login">
            Login
        </a>

    </div>

</div>

</body>
</html>
